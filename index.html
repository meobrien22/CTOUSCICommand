function Back({t,label,onBack}){ return <button onClick={onBack} style={{background:"none",border:"none",color:t.pri,fontSize:13,fontWeight:600,cursor:"pointer",padding:"0 0 14px",display:"block"}}>← {label}</button>; }

}
