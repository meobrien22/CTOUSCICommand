/* ── HELPERS ──────────────────────────────────────────────────────────── */
function cv(k, t) { return ({pri:t.pri,grn:t.grn,org:t.org,red:t.red,yel:t.yel,pur:t.pur})[k] || t.pri; }
function cb(k, t) { return ({pri:t.priLt,grn:t.grnLt,org:t.orgLt,red:t.redLt,yel:t.yelLt,pur:t.purLt})[k] || t.priLt; }

/* ── BASE COMPONENTS ──────────────────────────────────────────────────── */
function Badge({label, clr, t}) {
  return <span style={{background:cb(clr,t),color:cv(clr,t),fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:2,display:"inline-block"}}>{label}</span>;
}
function SLabel({t, children, style}) {
  return <div style={{fontSize:11,fontWeight:700,color:t.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,...style}}>{children}</div>;
}
function Back({t, label, onBack}) {
  return <button onClick={onBack} style={{background:"none",border:"none",color:t.pri,fontSize:13,fontWeight:600,cursor:"pointer",padding:"0 0 14px",display:"block"}}>← {label}</button>;
}
function ProgBar({pct, clr, t}) {
  return <div style={{height:4,background:t.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:cv(clr,t),borderRadius:2}}/></div>;
}

/* ── ASK MEGHAN ───────────────────────────────────────────────────────── */
function MeghanPage({t}) {
  const [msgs, setMsgs] = useState([{role:"assistant",content:"Hello Wade. I'm Ask Meghan — your executive intelligence layer for USCI.\n\nI know your pipeline, your accounts, your decks, and your signals. Use the prompts below or ask me anything."}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [apiKey, setApiKey] = useState(localStorage.getItem("meghan_api_key")||"");
  const [showKey, setShowKey] = useState(!localStorage.getItem("meghan_api_key"));
  const bottomRef = useRef(null);

  const PROMPTS = [
    {label:"🎯 What needs my attention today",prompt:"Give Wade Graham a prioritized list of what needs his attention today across USCI. Be specific: name accounts, dollar amounts, and deadlines. Maximum 5 items, ranked by urgency."},
    {label:"🛒 Prep me for the Walmart meeting",prompt:"Prep Wade Graham for his upcoming Walmart CTO introduction call. Give him: the 3 things he must know, the opening he should use, the 2 questions he should ask, and the deck he should bring."},
    {label:"⚡ Chevron competitive response",prompt:"Chevron just announced a Google exploration AI partnership. Give Wade a specific response plan: what to say to the Chevron CDO, how to use the Azure OpenAI seismic POC result as a counter, and what action to take before the April 22 briefing."},
    {label:"📈 Top pipeline moves this week",prompt:"What are the top 3 pipeline actions Wade Graham should take this week to close Q1 at 82% or above? Name the accounts, the dollar amounts, and the specific action for each."},
    {label:"🏭 JCI — next move",prompt:"What is the single best next move Wade Graham can make on the Johnson Controls Digital Twins expansion? Give the business case in 2 sentences and which deck to use."},
  ];

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [msgs]);

  function saveKey(k) {
    setApiKey(k);
    if (k) { localStorage.setItem("meghan_api_key", k); setShowKey(false); }
  }

  async function send(text) {
    if (!text.trim()) return;
    if (!apiKey) { setShowKey(true); return; }
    const next = [...msgs, {role:"user",content:text}];
    setMsgs(next); setInput(""); setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-opus-4-5",max_tokens:1000,system:MEGAN_SYS,messages:next.map(m=>({role:m.role,content:m.content}))})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      setMsgs([...next, {role:"assistant",content:data.content[0].text}]);
    } catch(e) {
      setMsgs([...next, {role:"assistant",content:`Connection issue: ${e.message}`}]);
    }
    setLoading(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 112px)"}}>
      <div style={{background:"#0078d4",padding:"14px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff",flexShrink:0}}>MF</div>
        <div>
          <div style={{color:"#fff",fontWeight:700,fontSize:16}}>Ask Meghan</div>
          <div style={{color:"rgba(255,255,255,0.8)",fontSize:11}}>Meghan Fasano · Executive Intelligence for USCI</div>
        </div>
        <button onClick={() => setShowKey(true)} style={{marginLeft:"auto",background:"rgba(255,255,255,0.15)",border:"none",borderRadius:2,color:"rgba(255,255,255,0.8)",fontSize:11,padding:"4px 10px",cursor:"pointer"}}>API Key</button>
      </div>

      {showKey && (
        <div style={{background:t.orgLt,border:`1px solid ${t.org}44`,padding:"12px 16px",flexShrink:0}}>
          <div style={{color:t.org,fontSize:11,fontWeight:700,marginBottom:6}}>Enter your Anthropic API key to enable Ask Meghan</div>
          <div style={{display:"flex",gap:8}}>
            <input type="password" defaultValue={apiKey} placeholder="sk-ant-..." onChange={e => setApiKey(e.target.value)} style={{flex:1,background:t.surf,border:`1px solid ${t.border}`,borderRadius:2,padding:"8px 10px",fontSize:12,color:t.txt,outline:"none"}}/>
            <button onClick={() => saveKey(apiKey)} style={{background:t.org,border:"none",borderRadius:2,padding:"8px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save</button>
            {apiKey && <button onClick={() => setShowKey(false)} style={{background:t.alt,border:`1px solid ${t.border}`,borderRadius:2,padding:"8px 14px",color:t.txt2,fontSize:12,cursor:"pointer"}}>✕</button>}
          </div>
          <div style={{color:t.muted,fontSize:10,marginTop:6}}>Your key is stored locally in your browser only. Get a key at console.anthropic.com</div>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i) => (
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant" && <div style={{width:24,height:24,borderRadius:"50%",background:"#0078d4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0,marginRight:8,marginTop:2}}>MF</div>}
            <div style={{maxWidth:"82%",background:m.role==="user"?t.pri:t.surf,color:m.role==="user"?"#fff":t.txt,borderRadius:m.role==="user"?"2px 2px 2px 8px":"2px 2px 8px 2px",padding:"10px 14px",fontSize:14,lineHeight:1.7,whiteSpace:"pre-wrap",border:m.role==="assistant"?`1px solid ${t.border}`:"none",boxShadow:m.role==="assistant"?t.shadow:"none"}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",justifyContent:"flex-start",alignItems:"flex-start",gap:8}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:"#0078d4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>MF</div>
            <div style={{background:t.surf,borderRadius:"2px 2px 8px 2px",padding:"10px 14px",fontSize:14,color:t.txt2,border:`1px solid ${t.border}`}}>Thinking…</div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      <div style={{padding:"8px 12px 10px",borderTop:`1px solid ${t.border}`,background:t.surf,flexShrink:0}}>
        <div style={{color:t.muted,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>Quick prompts</div>
        <div style={{display:"flex",overflowX:"auto",gap:8,marginBottom:10,paddingBottom:4}}>
          {PROMPTS.map((p,i) => (
            <button key={i} onClick={() => send(p.prompt)} style={{background:t.alt,border:`1px solid ${t.border}`,borderRadius:2,padding:"7px 13px",fontSize:12,color:t.txt2,cursor:"pointer",whiteSpace:"nowrap",fontWeight:600,flexShrink:0}}>
              {p.label}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => {if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(input);}}} placeholder="Ask about pipeline, accounts, prep…" style={{flex:1,background:t.alt,border:`1px solid ${t.border}`,borderRadius:2,padding:"10px 13px",fontSize:14,color:t.txt,outline:"none"}}/>
          <button onClick={() => send(input)} style={{background:t.pri,border:"none",borderRadius:2,padding:"10px 18px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Send</button>
        </div>
      </div>
    </div>
  );
}

/* ── TOP BAR ──────────────────────────────────────────────────────────── */

        <svg width="18" height="18" viewBox="0 0 18 18">
          {[[0,0],[7,0],[14,0],[0,7],[7,7],[14,7],[0,14],[7,14],[14,14]].map(([x,y],i) => (
            <rect key={i} x={x} y={y} width="4" height="4" fill={t.txt2} rx="0.5"/>

        {mode==="light"?"🌙":"☀️"}
      </button>
      <div style={{width:28,height:28,borderRadius:"50%",background:"#0078d4",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <span style={{color:"#fff",fontSize:10,fontWeight:700}}>WG</span>
      </div>
    </div>
  );

  return (
    <div style={{background:"#0078d4",padding:"7px 14px",display:"flex",alignItems:"center",gap:8,overflowX:"auto",flexShrink:0}}>

/* ── BOTTOM NAV ───────────────────────────────────────────────────────── */
const NAV_TABS = [
  {id:"home",icon:"🏠",label:"Home",color:"#0078d4"},
  {id:"pipeline",icon:"📈",label:"Pipeline",color:"#107c10"},
  {id:"decks",icon:"📂",label:"Decks",color:"#5c2d91"},
  {id:"briefings",icon:"📰",label:"Briefings",color:"#ca5010"},
  {id:"projects",icon:"⚡",label:"Projects",color:"#7a6000"},
  {id:"megan",icon:"💬",label:"Meghan",color:"#a4262c"},
];

function BottomNav({page, setPage, t}) {
  return (
    <div style={{background:t.nav,borderTop:`1px solid ${t.border}`,display:"flex",flexShrink:0,boxShadow:"0 -2px 8px rgba(0,0,0,0.07)"}}>
      {NAV_TABS.map(tab => {
        const on = page===tab.id;
        return (
          <button key={tab.id} onClick={() => setPage(tab.id)} style={{flex:1,background:on?tab.color+"12":"none",border:"none",borderTop:`2px solid ${on?tab.color:"transparent"}`,cursor:"pointer",padding:"8px 0 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:18,lineHeight:1,opacity:on?1:0.35}}>{tab.icon}</span>
            <span style={{fontSize:9,fontWeight:on?700:400,color:on?tab.color:t.muted}}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ── APP ──────────────────────────────────────────────────────────────── */
function App() {
  const [mode, setMode] = useState("light");
  const [page, setPage] = useState("home");
  const [showWaffle, setShowWaffle] = useState(false);
  const [selAcct, setSelAcct] = useState(null);
  const t = mode==="light" ? LIGHT : DARK;

  function renderPage() {
    switch(page) {
      case "home":      return <HomePage t={t} setPage={setPage} setSelAcct={setSelAcct}/>;
      case "pipeline":  return <PipelinePage t={t} setSelAcct={setSelAcct}/>;
      case "decks":     return <DecksPage t={t}/>;
      case "briefings": return <BriefingsPage t={t} setSelAcct={setSelAcct}/>;
      case "projects":  return <ProjectsPage t={t} setSelAcct={setSelAcct}/>;
      case "megan":     return <MeghanPage t={t}/>;
      default:          return <HomePage t={t} setPage={setPage} setSelAcct={setSelAcct}/>;
    }
  }

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:t.bg,fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",maxWidth:500,margin:"0 auto",overflow:"hidden",position:"relative"}}>
      <TopBar t={t} mode={mode} setMode={setMode} onWaffle={() => setShowWaffle(true)} page={page}/>
      {page==="home" && <JudsonBar t={t}/>}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>{renderPage()}</div>
      <BottomNav page={page} setPage={setPage} t={t}/>
      {showWaffle && <WaffleMenu t={t} onClose={() => setShowWaffle(false)} setPage={setPage}/>}
      {selAcct && <AccountDetail acct={selAcct} t={t} onClose={() => setSelAcct(null)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
